<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CREATOR</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Segoe UI, sans-serif;
background:#111;
color:#fff;
text-align:center;
}

header{
padding:25px 10px;
}

header h1{
font-size:28px;
letter-spacing:3px;
}

.section{
margin:20px;
padding:20px;
background:#1c1c1c;
border-radius:12px;
cursor:pointer;
}

.section h2{
margin-bottom:15px;
font-size:20px;
}

.gallery-preview{
display:flex;
gap:10px;
justify-content:center;
}

.gallery-preview img{
width:90px;
height:90px;
object-fit:cover;
border-radius:8px;
}

.contact-btn{
margin:30px;
padding:15px;
background:#ff6a00;
border:none;
color:#fff;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
}

.overlay img{
max-width:90%;
max-height:70%;
}

.back-btn{
position:absolute;
top:20px;
left:20px;
background:#ff6a00;
border:none;
color:#fff;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>CREATOR</h1>
</header>

<div class="section" onclick="openGallery('laser')">
<h2>ЛАЗЕР</h2>
<div class="gallery-preview">
<img src="frez1.jpg">
<img src="frez2.jpg">
<img src="frez3.jpg">
</div>
</div>

<div class="section" onclick="openGallery('marker')">
<h2>ГРАВЕР</h2>
<div class="gallery-preview">
<img src="frez1.jpg">
<img src="frez2.jpg">
<img src="frez3.jpg">
</div>
</div>

<div class="section" onclick="openGallery('frez')">
<h2>ФРЕЗЕР</h2>
<div class="gallery-preview">
<img src="frez1.jpg">
<img src="frez2.jpg">
<img src="frez3.jpg">
</div>
</div>

<button class="contact-btn" onclick="location.href='contact.html'">
Связаться со мной
</button>

<div class="overlay" id="overlay">
<button class="back-btn" onclick="closeGallery()">Назад</button>
<img id="galleryImage">
</div>

<script>
let images=[];
let index=0;

function openGallery(type){
if(type==='laser'){
images=['frez1.jpg','frez2.jpg','frez3.jpg'];
}
if(type==='marker'){
images=['frez1.jpg','frez2.jpg','frez3.jpg'];
}
if(type==='frez'){
images=['frez1.jpg','frez2.jpg','frez3.jpg'];
}

index=0;
document.getElementById("galleryImage").src=images[index];
document.getElementById("overlay").style.display="flex";
}

function closeGallery(){
document.getElementById("overlay").style.display="none";
}

document.getElementById("galleryImage").addEventListener("click",function(){
index++;
if(index>=images.length){index=0;}
this.src=images[index];
});
</script>

</body>
</html>
